<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTD6 Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 600px; }
  h2 { margin: 20px 0 8px; }
  .field { margin-bottom: 8px; }
  .field label { display: inline-block; width: 240px; }
  .field input { width: 160px; }
  .warn { color: orange; font-size: 13px; }
  #status { margin: 8px 0; font-size: 13px; }
  #editor { display: none; }
  button { margin-right: 8px; margin-top: 16px; }
</style>
</head>
<body>

<h1>BTD6 Save Editor</h1>
<p>Pick your Profile.Save file to get started.</p>

<input type="file" id="fileInput" accept=".Save,.save">
<div id="status"></div>

<div id="editor">

  <h2>Currency</h2>
  <div class="field"><label>Monkey Money</label><input type="number" id="monkeyMoney" min="0"></div>
  <div class="field"><label>Trophies</label><input type="number" id="trophies" min="0"></div>
  <div class="field"><label>Knowledge Points (available)</label><input type="number" id="knowledgePoints" min="0"></div>
  <div class="field"><label>Knowledge Points (spent total)</label><input type="number" id="totalKnowledgePointsEarned" min="0"></div>
  <div class="field"><label>Daily Chest day index</label><input type="number" id="dailyRewardIndex" min="0"></div>
  <div class="field"><label>Daily Chests opened</label><input type="number" id="consecutiveDailyLogin" min="0"></div>

  <h2>XP & Level</h2>
  <p class="warn">Warning: editing XP or rank may flag your account on leaderboards.</p>
  <div class="field"><label>XP (levels 1–155)</label><input type="number" id="xp" min="0"></div>
  <div class="field"><label>Veteran XP (level 156+)</label><input type="number" id="veteranXp" min="0"></div>
  <div class="field"><label>Rank (1–155)</label><input type="number" id="rank" min="1" max="155"></div>
  <div class="field"><label>Veteran Rank (156+)</label><input type="number" id="veteranRank" min="0"></div>

  <h2>Lifetime Stats</h2>
  <div class="field"><label>Bloons Popped</label><input type="number" id="bloonsPopped" min="0"></div>
  <div class="field"><label>MOABs Popped</label><input type="number" id="moabsPopped" min="0"></div>
  <div class="field"><label>Games Played</label><input type="number" id="gamesPlayed" min="0"></div>
  <div class="field"><label>Games Won</label><input type="number" id="gamesWon" min="0"></div>
  <div class="field"><label>Highest Round</label><input type="number" id="highestRound" min="0"></div>
  <div class="field"><label>Total Cash Earned</label><input type="number" id="cashEarned" min="0"></div>
  <div class="field"><label>Powers Used</label><input type="number" id="powersUsed" min="0"></div>
  <div class="field"><label>Insta Monkeys Used</label><input type="number" id="instasUsed" min="0"></div>
  <div class="field"><label>Races Entered</label><input type="number" id="racesEntered" min="0"></div>

  <br>
  <button onclick="downloadSave()">Download .Save</button>
  <button onclick="downloadJSON()">Download JSON</button>
  <button onclick="reset()">Reset</button>

</div>

<script>
let profile   = null;
let rawHeader = null;
let rawPwdIdx = null;
let rawSalt   = null;
let fileName  = 'Profile.Save';

const FIELDS = [
  'monkeyMoney', 'trophies', 'knowledgePoints', 'totalKnowledgePointsEarned',
  'dailyRewardIndex', 'consecutiveDailyLogin',
  'xp', 'veteranXp', 'rank', 'veteranRank',
  'bloonsPopped', 'moabsPopped', 'gamesPlayed', 'gamesWon', 'highestRound',
  'cashEarned', 'powersUsed', 'instasUsed', 'racesEntered'
];

async function deriveKeyIV(salt) {
  const mat = await crypto.subtle.importKey('raw', new TextEncoder().encode('11'), 'PBKDF2', false, ['deriveBits']);
  const d   = new Uint8Array(await crypto.subtle.deriveBits({ name:'PBKDF2', hash:'SHA-1', salt, iterations:10 }, mat, 256));
  return { iv: d.slice(0,16), key: d.slice(16,32) };
}

async function decryptSave(buffer) {
  const b       = new Uint8Array(buffer);
  rawHeader     = b.slice(0, 44);
  rawPwdIdx     = b.slice(44, 52);
  rawSalt       = b.slice(52, 76);
  const enc     = b.slice(76);
  const { iv, key } = await deriveKeyIV(rawSalt);
  const aesKey  = await crypto.subtle.importKey('raw', key, { name:'AES-CBC' }, false, ['decrypt']);
  const dec     = new Uint8Array(await crypto.subtle.decrypt({ name:'AES-CBC', iv }, aesKey, enc));
  return JSON.parse(new TextDecoder().decode(pako.inflate(dec)));
}

async function encryptSave(obj) {
  const json       = new TextEncoder().encode(JSON.stringify(obj));
  const compressed = pako.deflate(json, { level: 6 });
  const newSalt    = crypto.getRandomValues(new Uint8Array(24));
  const { iv, key } = await deriveKeyIV(newSalt);
  const aesKey     = await crypto.subtle.importKey('raw', key, { name:'AES-CBC' }, false, ['encrypt']);
  const enc        = await crypto.subtle.encrypt({ name:'AES-CBC', iv }, aesKey, compressed);
  const out        = new Uint8Array(44 + 8 + 24 + enc.byteLength);
  out.set(rawHeader, 0);
  out.set(rawPwdIdx, 44);
  out.set(newSalt, 52);
  out.set(new Uint8Array(enc), 76);
  return out;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function populateFields() {
  for (const key of FIELDS) {
    const el = document.getElementById(key);
    if (el && profile[key] !== undefined) el.value = profile[key];
  }
}

function collectFields() {
  for (const key of FIELDS) {
    const el = document.getElementById(key);
    if (!el) continue;
    const val = el.value.trim();
    if (val === '') continue;
    profile[key] = typeof profile[key] === 'number' ? Number(val) : val;
  }
}

function dl(blob, name) {
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: name });
  a.click();
  URL.revokeObjectURL(a.href);
}

async function downloadSave() {
  collectFields();
  setStatus('Encrypting...');
  try {
    const bytes = await encryptSave(profile);
    dl(new Blob([bytes], { type: 'application/octet-stream' }), fileName);
    setStatus('Done.');
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

function downloadJSON() {
  collectFields();
  dl(new Blob([JSON.stringify(profile, null, 2)], { type: 'application/json' }),
     fileName.replace(/\.Save$/i, '') + '_decrypted.json');
}

function reset() {
  profile = rawHeader = rawPwdIdx = rawSalt = null;
  document.getElementById('editor').style.display = 'none';
  document.getElementById('fileInput').value = '';
  setStatus('');
}

async function loadFile(file) {
  if (file.name.toLowerCase() !== 'profile.save') {
    setStatus('That doesn\'t look like a Profile.Save file.');
    document.getElementById('fileInput').value = '';
    return;
  }
  fileName = file.name;
  setStatus('Decrypting...');
  try {
    profile = await decryptSave(await file.arrayBuffer());
    document.getElementById('editor').style.display = 'block';
    populateFields();
    setStatus('Loaded.');
  } catch(e) {
    setStatus('Failed to decrypt: ' + e.message);
  }
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
</script>
</body>
</html>
